name: Node CI

on:
  push:
    branches-ignore:
      - 'dependabot/**'
  pull_request:
    branches:
      - '*'

jobs:
  test:
    name: Test License Checker

    permissions:
      contents: read

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 24.x

      - name: npm install
        run: npm ci --ignore-scripts
        env:
          CI: true

      - name: Test 1 - Runs with valid configs (No invalid licenses)
        id: test1
        uses: ./
        with:
          license-config: test/licence_checker_with_allowed.yml
          include-asf-category-a: true

      - name: Test 2 - Runs with no options (detected full invalid licenses)
        id: test2
        continue-on-error: true
        uses: ./

      - name: Test 3 - Runs with include-asf-category-a only (detected few invalid licenses)
        id: test3
        continue-on-error: true
        uses: ./
        with:
          include-asf-category-a: true

      - name: Test 4 - Runs with include-asf-category-a only (detected few invalid licenses)
        id: test4
        continue-on-error: true
        uses: ./
        with:
          license-config: test/licence_checker_ignored_only.yml

      - name: Test 5 - Rejects path traversal
        id: test5
        continue-on-error: true
        uses: ./
        with:
          license-config: ../../licence_checker_with_allowed.yml

      - name: Assert that invalid tests failed
        run: |
          if [ "${STEPS_TEST2_OUTCOME}" != "failure" ]; then
            echo "Test 2 did not fail as expected"
            exit 1
          fi

          if [ "${STEPS_TEST3_OUTCOME}" != "failure" ]; then
            echo "Test 3 did not fail as expected"
            exit 1
          fi

          if [ "${STEPS_TEST4_OUTCOME}" != "failure" ]; then
            echo "Test 4 did not fail as expected"
            exit 1
          fi

          if [ "${STEPS_TEST5_OUTCOME}" != "failure" ]; then
            echo "Test 5 did not fail as expected"
            exit 1
          fi
        env:
          STEPS_TEST2_OUTCOME: ${{ steps.test2.outcome }}
          STEPS_TEST3_OUTCOME: ${{ steps.test3.outcome }}
          STEPS_TEST4_OUTCOME: ${{ steps.test4.outcome }}
          STEPS_TEST5_OUTCOME: ${{ steps.test5.outcome }}

  codeql:
    name: CodeQL

    permissions:
      contents: read
      security-events: write

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: github/codeql-action/init@c10b8064de6f491fea524254123dbe5e09572f13 # v4.35.1
        with:
          languages: javascript, actions
          queries: security-and-quality
          config: |
            paths-ignore:
              - node_modules

      - uses: github/codeql-action/analyze@c10b8064de6f491fea524254123dbe5e09572f13 # v4.35.1

  apacherat:
    name: Apache RAT (License Header Checker)

    permissions:
      contents: read

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: erisu/apache-rat-action@46fb01ce7d8f76bdcd7ab10e7af46e1ea95ca01c # v2.0.0
